{% extends "base.html" %}
{% block title %}Search history{% endblock %}
{% block content %}
  <h2>Search History</h2>
  <ul>
    {% for entry in entries %}
      <li>{{ entry.query }} — {{ entry.searched_at }}
        <a href="{% url 'weather:city_detail' entry.latitude entry.longitude %}">View</a>
      </li>
    {% empty %}
      <li>No searches yet.</li>
    {% endfor %}
  </ul>
{% endblock %}
