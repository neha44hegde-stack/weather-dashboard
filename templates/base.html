{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="{% if user.is_authenticated and user.profile.theme %}{{ user.profile.theme }}{% else %}light{% endif %}">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Weather Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="manifest" href="{% static 'manifest.json' %}">
  <meta name="theme-color" content="#2b6cb0">
  <link rel="icon" href="{% static 'icons/icon-192.png' %}">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register("{% static 'service-worker.js' %}");
      });
    }
  </script>
</head>
<body>
  <header>
    <h1>🌤️ Weather Dashboard</h1>
    <nav>
      {% if user.is_authenticated %}
        <a href="{% url 'weather:dashboard' %}">Dashboard</a>
        <a href="{% url 'weather:history' %}">History</a>
        <a href="{% url 'accounts:profile' %}">Profile</a>
        <form action="{% url 'accounts:logout' %}" method="post" style="display:inline">
          {% csrf_token %}
          <button type="submit">Logout</button>
        </form>
      {% else %}
        <a href="{% url 'accounts:login' %}">Login</a>
        <a href="{% url 'accounts:register' %}">Register</a>
      {% endif %}
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
